<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RLLK">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>RLLK Sticking Trainer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:            #0d0d0d;
    --surface:       #161616;
    --surface-2:     #1e1e1e;
    --border:        rgba(255,255,255,0.06);
    --border-mid:    rgba(255,255,255,0.10);
    --border-strong: rgba(255,255,255,0.20);
    --text:          #dedede;
    --text-2:        #6e6e6e;
    --text-3:        #333;
    --accent:        #c88a38;
    --mono: 'JetBrains Mono', ui-monospace, 'Cascadia Code', monospace;
    --sans: system-ui, -apple-system, sans-serif;
  }

  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* â”€â”€ Header â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .hdr { padding: 2rem 2.5rem 1.75rem; max-width: 980px; margin: 0 auto; border-bottom: 1px solid var(--border); }
  .hdr-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
  .hdr-name { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: 0.04em; }
  .hdr-title { font-size: 15px; font-weight: 400; color: var(--text); letter-spacing: 0.01em; }
  .hdr-sub { font-size: 11.5px; color: var(--text-2); letter-spacing: 0.05em; }
  .hdr-btns { margin-left: auto; display: flex; gap: 6px; }

  /* â”€â”€ Wrap â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .wrap { max-width: 980px; margin: 0 auto; padding: 1.75rem 2.5rem 4rem; }

  /* â”€â”€ Legend â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .legend { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 1.5rem; }
  .li { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-2); background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 3px 9px 3px 6px; }
  .ld { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
  .ld-R  { background: #3a1818; border: 1px solid #7a3535; }
  .ld-l  { background: #282828; border: 1px solid #444; }
  .ld-K  { background: #28241a; border: 1px solid #5a5238; }
  .ld-RL { background: #0d1e2e; border: 1px solid #285080; }
  .ld-T  { background: #28180a; border: 1px solid #7a5020; }
  .ld-H  { background: #0a1e18; border: 1px solid #206848; }
  .ld-Rx { background: #3a1818; border: 2px solid #d06060; }

  /* â”€â”€ Controls â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .controls { display: flex; flex-wrap: wrap; gap: 24px; align-items: flex-start; margin-bottom: 1.5rem; padding: 1rem 1.25rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
  .ctrl-group { display: flex; flex-direction: column; gap: 8px; }
  .ctrl-label { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-2); }
  .ctrl-opts { display: flex; gap: 3px; align-items: center; flex-wrap: wrap; }
  .cbtn { font-size: 11.5px; padding: 4px 12px; border: 1px solid var(--border-mid); border-radius: 4px; background: transparent; color: var(--text-2); cursor: pointer; font-family: var(--sans); transition: border-color 0.12s, color 0.12s, background 0.12s; }
  .cbtn:hover { border-color: var(--border-strong); color: var(--text); }
  .cbtn.on { background: var(--surface-2); color: var(--text); border-color: var(--border-strong); font-weight: 500; }

  /* â”€â”€ Metronome â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .metro-group { border-left: 1px solid var(--border); padding-left: 20px; }
  .metro-beats { display: flex; gap: 6px; align-items: center; }
  .metro-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border-mid); transition: background 0.06s; flex-shrink: 0; }
  .metro-dot.beat1 { width: 13px; height: 13px; }
  .metro-dot.active { background: var(--accent); }
  .bpm-slider { -webkit-appearance: none; width: 110px; height: 3px; background: var(--border-mid); border-radius: 2px; outline: none; cursor: pointer; }
  .bpm-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; }
  .bpm-val { font-size: 11px; color: var(--text-2); font-family: var(--mono); white-space: nowrap; min-width: 58px; }

  /* â”€â”€ Utility buttons â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .util-btn { background: transparent; border: 1px solid var(--border-mid); border-radius: 4px; color: var(--text-2); cursor: pointer; font-size: 12px; padding: 4px 10px; font-family: var(--sans); transition: border-color 0.12s, color 0.12s; white-space: nowrap; }
  .util-btn:hover { border-color: var(--border-strong); color: var(--text); }

  /* â”€â”€ Tab bar â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .tab-bar { display: flex; margin-bottom: 1.75rem; border-bottom: 1px solid var(--border); overflow-x: auto; }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab { font-size: 13px; padding: 8px 16px; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--text-2); cursor: pointer; font-family: var(--sans); margin-bottom: -1px; transition: color 0.12s, border-color 0.12s; white-space: nowrap; }
  .tab:hover { color: var(--text); }
  .tab.on { color: var(--text); border-bottom-color: var(--accent); font-weight: 500; }

  /* â”€â”€ Stacked takt layout â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .takt-sep { height: 10px; }
  .stacked-lbl { font-size: 10px; font-family: var(--mono); color: var(--text-2); margin-bottom: 3px; padding-top: 2px; }

  /* â”€â”€ Section title â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .sec-title { font-size: 10.5px; font-weight: 500; color: var(--text-2); letter-spacing: 0.09em; text-transform: uppercase; margin-bottom: 1rem; }

  /* â”€â”€ Exercise block â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .ex-block { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.1rem 1.3rem; margin-bottom: 0.6rem; cursor: pointer; transition: border-color 0.12s; }
  .ex-block:hover { border-color: var(--border-strong); }
  .ex-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 0.3rem; }
  .ex-desc { font-size: 11.5px; color: var(--text-2); margin-bottom: 0.85rem; line-height: 1.6; }

  /* â”€â”€ Grid â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .grid-outer { overflow-x: auto; padding-bottom: 4px; }
  .grid-row { display: flex; align-items: center; margin-bottom: 2px; min-width: max-content; font-family: var(--mono); }
  .row-lbl { font-size: 10px; color: var(--text-2); width: 34px; text-align: right; padding-right: 8px; flex-shrink: 0; letter-spacing: 0.03em; }
  .cell { width: 28px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .cell.beat-start { border-left: 2px solid var(--border-mid); }
  .cell.takt-start { border-left: 3px solid var(--border-strong); }

  .cell-R    { background: #2a1212; color: #e05555; }
  .cell-l    { background: var(--surface); color: var(--text-2); }
  .cell-K    { background: var(--surface); color: var(--text-2); }
  .cell-RL   { background: #0c1c2c; color: #5888d0; }
  .cell-RLl  { background: #0c1c2c; color: #5888d0; }
  .cell-Rt   { background: #221408; color: #d89050; }
  .cell-lt   { background: #221408; color: #b07038; }
  .cell-Kt   { background: #221408; color: #b07038; }
  .cell-H    { background: #0a1c18; color: #46b888; font-size: 10px; }
  .cell-empty { background: #131313; color: var(--text-3); }
  .cell-Rb   { background: #2a1414; color: #d87070; outline: 2px solid #b04848; outline-offset: -2px; }

  .bn { width: 28px; text-align: center; font-size: 9px; color: var(--text-3); flex-shrink: 0; }
  .bn.beat { font-weight: 600; color: var(--text-2); font-size: 9.5px; }
  .bn.plus { color: var(--text-3); }
  .tgap { width: 8px; flex-shrink: 0; }
  .tlbl { font-size: 9px; color: var(--text-2); text-align: center; flex-shrink: 0; padding-bottom: 2px; font-family: var(--mono); }

  .grid-outer::-webkit-scrollbar { height: 3px; }
  .grid-outer::-webkit-scrollbar-track { background: transparent; }
  .grid-outer::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }

  /* â”€â”€ Light theme â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  html.light {
    --bg: #f5f5f4; --surface: #ffffff; --surface-2: #ebebeb;
    --border: rgba(0,0,0,0.07); --border-mid: rgba(0,0,0,0.13); --border-strong: rgba(0,0,0,0.24);
    --text: #1a1a1a; --text-2: #666; --text-3: #bbb; --accent: #a06e28;
  }
  html.light .cell-R    { background: #fce8e8; color: #b03030; }
  html.light .cell-l    { background: #efefef; color: #555; }
  html.light .cell-K    { background: #efefef; color: #555; }
  html.light .cell-RL   { background: #daeaf8; color: #1a56db; }
  html.light .cell-RLl  { background: #daeaf8; color: #1a56db; }
  html.light .cell-Rt   { background: #fef3c7; color: #92400e; }
  html.light .cell-lt   { background: #fef3c7; color: #92400e; }
  html.light .cell-Kt   { background: #fef3c7; color: #92400e; }
  html.light .cell-H    { background: #d1fae5; color: #065f46; }
  html.light .cell-empty { background: #e8e8e8; color: #ccc; }
  html.light .cell-Rb   { background: #fce8e8; color: #b03030; outline-color: #b03030; }

  /* â”€â”€ Focus overlay â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  #focus-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 1000; align-items: center; justify-content: center; padding: 24px; cursor: pointer; }
  #focus-content { transform-origin: center center; pointer-events: none; cursor: default; transition: opacity 0.13s ease; }
  #focus-content .ex-block { margin-bottom: 0; }
  #focus-content .grid-outer { overflow: visible; }

  /* â”€â”€ Focus navigation â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .focus-nav { position: fixed; top: 50%; transform: translateY(-50%); background: transparent; border: none; color: var(--text-3); font-size: 28px; line-height: 1; padding: 20px 14px; cursor: pointer; z-index: 1001; transition: color 0.12s; -webkit-tap-highlight-color: transparent; }
  .focus-nav:hover { color: var(--text); }
  #focus-prev { left: 0; }
  #focus-next { right: 0; }
  .focus-nav[hidden] { display: none; }

  /* â”€â”€ Mobile â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  @media (max-width: 600px) {
    .hdr { padding: 1.25rem 1rem 1rem; }
    .wrap { padding: 1.25rem 1rem 3rem; }
    .hdr-name { font-size: 18px; }
    .metro-group { border-left: none; padding-left: 0; border-top: 1px solid var(--border); padding-top: 14px; width: 100%; }
    .bpm-slider { width: 90px; }
  }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <span class="hdr-name">RLLK</span>
    <span class="hdr-title" id="lbl-title">Sticking Trainer</span>
    <div class="hdr-btns">
      <button class="util-btn" id="lang-btn" onclick="toggleLang()">EN</button>
      <button class="util-btn" id="theme-btn" onclick="toggleTheme()">&#9728; Lyst</button>
    </div>
  </div>
  <div class="hdr-sub" id="lbl-sub">Rotasjon Â· RL-innsetting Â· 3-grupper Â· Fri kombinasjon</div>
</div>

<div class="wrap">

<div class="legend">
  <div class="li"><div class="ld ld-R"></div><span id="leg-R" style="color:#d87070">R â€” hÃ¸yre</span></div>
  <div class="li"><div class="ld ld-l"></div><span id="leg-L">L â€” venstre</span></div>
  <div class="li"><div class="ld ld-K"></div><span id="leg-K" style="color:#b8ad88">K â€” bass</span></div>
  <div class="li"><div class="ld ld-RL"></div><span id="leg-RL" style="color:#5888d0">RL â€” innsetting</span></div>
  <div class="li"><div class="ld ld-T"></div><span id="leg-T" style="color:#d89050">3-gruppe</span></div>
  <div class="li"><div class="ld ld-H"></div><span id="leg-H" style="color:#46b888">HH fot</span></div>
  <div class="li"><div class="ld ld-Rx"></div><span id="leg-Rx" style="color:#d87070">R overgang</span></div>
</div>

<div class="controls">
  <div class="ctrl-group">
    <div class="ctrl-label" id="lbl-hh">Hihat fot</div>
    <div class="ctrl-opts" id="hh-btns">
      <button class="cbtn on" id="hh-4" onclick="setHH('4',this)">4-deler</button>
      <button class="cbtn" id="hh-8" onclick="setHH('8',this)">8-deler</button>
      <button class="cbtn" id="hh-8up" onclick="setHH('8up',this)">8dels upbeat (+)</button>
      <button class="cbtn" id="hh-off" onclick="setHH('off',this)">Av</button>
    </div>
  </div>
  <div class="ctrl-group metro-group">
    <div class="ctrl-label" id="lbl-metro">Metronom</div>
    <div class="ctrl-opts">
      <button class="cbtn" id="metro-btn" onclick="toggleMetronome()">&#9654; Start</button>
      <div class="metro-beats">
        <div class="metro-dot beat1" id="md0"></div>
        <div class="metro-dot" id="md1"></div>
        <div class="metro-dot" id="md2"></div>
        <div class="metro-dot" id="md3"></div>
      </div>
      <input type="range" class="bpm-slider" id="bpm-slider" min="40" max="220" value="80" oninput="setBPM(this.value)">
      <span class="bpm-val" id="bpm-val">80 BPM</span>
    </div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab on" id="tab-btn-rot" onclick="showTab('rot',this)">Rotasjon</button>
  <button class="tab" id="tab-btn-rl" onclick="showTab('rl',this)">RL-innsetting</button>
  <button class="tab" id="tab-btn-tri" onclick="showTab('tri',this)">3-grupper</button>
  <button class="tab" id="tab-btn-fri" onclick="showTab('fri',this)">Fri kombinasjon</button>
</div>

<div id="tab-rot"></div>
<div id="tab-rl" style="display:none"></div>
<div id="tab-tri" style="display:none"></div>
<div id="tab-fri" style="display:none"></div>

</div>

<div id="focus-overlay">
  <button id="focus-prev" class="focus-nav" hidden onclick="event.stopPropagation();navigateFocus(-1)">&#8249;</button>
  <div id="focus-content"></div>
  <button id="focus-next" class="focus-nav" hidden onclick="event.stopPropagation();navigateFocus(1)">&#8250;</button>
</div>

<script>
// â”€â”€â”€ LANGUAGE â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
var LANG = localStorage.getItem('rllk-lang') || 'no';
var TXT = {
  no: {
    title:'Sticking Trainer',
    sub:'Rotasjon Â· RL-innsetting Â· 3-grupper Â· Fri kombinasjon',
    lbl_hh:'Hihat fot', lbl_metro:'Metronom',
    metro_start:'â–º Start', metro_stop:'â—¼ Stopp',
    theme_light:'â˜€ Lyst', theme_dark:'â˜¾ MÃ¸rkt',
    lang_btn:'EN',
    tab_rot:'Rotasjon', tab_rl:'RL-innsetting', tab_tri:'3-grupper', tab_fri:'Fri kombinasjon',
    hh_4:'4-deler', hh_8:'8-deler', hh_8up:'8dels upbeat (+)', hh_off:'Av',
    leg_R:'R â€” hÃ¸yre', leg_L:'L â€” venstre', leg_K:'K â€” bass',
    leg_RL:'RL â€” innsetting', leg_T:'3-gruppe', leg_H:'HH fot', leg_Rx:'R overgang',
    row_hand:'HÃ¥nd', row_hh:'HH',
  },
  en: {
    title:'Sticking Trainer',
    sub:'Rotation Â· RL-insertion Â· Triplets Â· Free combo',
    lbl_hh:'Hi-hat foot', lbl_metro:'Metronome',
    metro_start:'â–º Start', metro_stop:'â—¼ Stop',
    theme_light:'â˜€ Light', theme_dark:'â˜¾ Dark',
    lang_btn:'NO',
    tab_rot:'Rotation', tab_rl:'RL-insertion', tab_tri:'Triplets', tab_fri:'Free combo',
    hh_4:'Quarter notes', hh_8:'Eighth notes', hh_8up:'Upbeat 8ths (+)', hh_off:'Off',
    leg_R:'R â€” right', leg_L:'L â€” left', leg_K:'K â€” bass',
    leg_RL:'RL â€” insert', leg_T:'Triplet', leg_H:'HH foot', leg_Rx:'R transition',
    row_hand:'Hand', row_hh:'HH',
  }
};
function s(k) { return (TXT[LANG] && TXT[LANG][k] !== undefined) ? TXT[LANG][k] : (TXT.no[k] || k); }

function applyLang() {
  var isLight = document.documentElement.classList.contains('light');
  document.documentElement.lang = LANG;
  document.getElementById('lbl-title').textContent = s('title');
  document.getElementById('lbl-sub').textContent = s('sub');
  document.getElementById('lbl-hh').textContent = s('lbl_hh');
  document.getElementById('lbl-metro').textContent = s('lbl_metro');
  document.getElementById('lang-btn').textContent = s('lang_btn');
  document.getElementById('theme-btn').textContent = isLight ? s('theme_dark') : s('theme_light');
  document.getElementById('hh-4').textContent = s('hh_4');
  document.getElementById('hh-8').textContent = s('hh_8');
  document.getElementById('hh-8up').textContent = s('hh_8up');
  document.getElementById('hh-off').textContent = s('hh_off');
  document.getElementById('leg-R').textContent = s('leg_R');

// â”€â”€â”€ STATE â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
var hhMode = '4';
var BASE = ['R','l','l','K'];
var currentTab = 'rot';
var tabDirty = { rot:true, rl:true, tri:true, fri:true };

function setHH(m, btn) {
  hhMode = m;
  document.querySelectorAll('#hh-btns .cbtn').forEach(function(b) { b.classList.remove('on'); });
  btn.classList.add('on');
  tabDirty = { rot:true, rl:true, tri:true, fri:true };
  renderActive();
}

function showTab(name, btn) {
  ['rot','rl','tri','fri'].forEach(function(t) {
    document.getElementById('tab-' + t).style.display = (t === name) ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach(function(b) { b.classList.remove('on'); });
  btn.classList.add('on');
  currentTab = name;
  renderActive();
}

function renderActive() {
  if (!tabDirty[currentTab]) return;
  if (currentTab === 'rot') renderRot();
  else if (currentTab === 'rl') renderRL();
  else if (currentTab === 'tri') renderTri();
  else if (currentTab === 'fri') renderFri();
  tabDirty[currentTab] = false;
}

// â”€â”€â”€ HELPERS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function hhVal(i) {
  var p = i % 16;
  if (hhMode === '4')   return (p===0||p===4||p===8||p===12) ? 'H' : 'empty';
  if (hhMode === '8')   return (p % 2 === 0) ? 'H' : 'empty';
  if (hhMode === '8up') return (p===2||p===6||p===10||p===14) ? 'H' : 'empty';
  return 'empty';
}
function cClass(v) {
  var m = { R:'cell-R', l:'cell-l', K:'cell-K', RL:'cell-RL', Ri:'cell-RL', Li:'cell-RLl',
            Rt:'cell-Rt', lt:'cell-lt', Kt:'cell-Kt', H:'cell-H', Rb:'cell-Rb' };
  return m[v] || 'cell-empty';
}
function cText(v) {
  if (v==='H')              return 'x';
  if (v==='empty')          return 'Â·';
  if (v==='l'||v==='lt')    return 'L';
  if (v==='Rb'||v==='Rt')   return 'R';
  if (v==='Kt')             return 'K';
  if (v==='Ri')             return 'R';
  if (v==='Li')             return 'L';
  return v;
}
function rep(arr, n) { var o=[]; for(var i=0;i<n;i++) o=o.concat(arr); return o; }
function rot(arr, n) {
  var a = arr.slice(); n = ((n%4)+4)%4;
  for (var i=0;i<n;i++) a.push(a.shift());
  return a;
}
function t16(fig) { return rep(fig, 4); }
function makeRL(base, pos) {
  var stream = rep(base, 5);
  return stream.slice(0, pos).concat(['Ri','Li']).concat(stream.slice(pos, 15));
}

// â”€â”€â”€ RENDER BLOCK â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function renderBlock(title, desc, takter, taktLabels, stacked) {
  var numT = takter.length;

  function makeRow(label, rowTakter) {
    var html = '<div class="grid-row"><div class="row-lbl">' + label + '</div>';
    rowTakter.forEach(function(seg, ti) {
      seg.forEach(function(v, i) {
        var extra = (i===0) ? ' takt-start' : (i%4===0 ? ' beat-start' : '');
        html += '<div class="cell ' + cClass(v) + extra + '">' + cText(v) + '</div>';
      });
      if (ti < rowTakter.length-1) html += '<div class="tgap"></div>';
    });
    html += '</div>';
    return html;
  }

  if (stacked) {
    var sh = '<div class="ex-block">';
    sh += '<div class="ex-title">' + title + '</div>';
    if (desc) sh += '<div class="ex-desc">' + desc + '</div>';
    takter.forEach(function(seg, ti) {
      if (ti > 0) sh += '<div class="takt-sep"></div>';
      if (taktLabels && taktLabels[ti]) sh += '<div class="stacked-lbl">' + taktLabels[ti] + '</div>';
      var bnRow = '<div class="grid-row"><div class="row-lbl" style="visibility:hidden">Â·</div>';
      seg.forEach(function(v, i) {
        var txt = '', cls = 'bn';
        if (i%4===0) { txt = i/4+1; cls = 'bn beat'; }
        else if (i%2===0) { txt = '+'; cls = 'bn plus'; }
        bnRow += '<div class="' + cls + '">' + txt + '</div>';
      });
      bnRow += '</div>';
      sh += '<div class="grid-outer"><div style="min-width:max-content">';
      sh += bnRow;
      sh += makeRow(s('row_hand'), [seg]);
      if (hhMode !== 'off') sh += makeRow(s('row_hh'), [seg.map(function(v,i){ return hhVal(i); })]);
      sh += '</div></div>';
    });
    sh += '</div>';
    return sh;
  }

  var tlHtml = '';
  if (taktLabels) {
    tlHtml = '<div class="grid-row"><div class="row-lbl" style="visibility:hidden">Â·</div>';
    takter.forEach(function(seg, ti) {
      tlHtml += '<div class="tlbl" style="width:' + (seg.length*28) + 'px">' + (taktLabels[ti]||'') + '</div>';
      if (ti < numT-1) tlHtml += '<div class="tgap"></div>';
    });
    tlHtml += '</div>';
  }
  var bnHtml = '<div class="grid-row"><div class="row-lbl" style="visibility:hidden">Â·</div>';
  takter.forEach(function(seg, ti) {
    seg.forEach(function(v, i) {
      var txt = '', cls = 'bn';
      if (i%4===0) { txt = i/4+1; cls = 'bn beat'; }
      else if (i%2===0) { txt = '+'; cls = 'bn plus'; }
      bnHtml += '<div class="' + cls + '">' + txt + '</div>';
    });
    if (ti < numT-1) bnHtml += '<div class="tgap"></div>';
  });
  bnHtml += '</div>';

  var hhTakter = takter.map(function(seg) { return seg.map(function(v,i){ return hhVal(i); }); });
  var html = '<div class="ex-block">';
  html += '<div class="ex-title">' + title + '</div>';
  if (desc) html += '<div class="ex-desc">' + desc + '</div>';
  html += '<div class="grid-outer"><div style="min-width:max-content">';
  if (tlHtml) html += tlHtml;
  html += bnHtml;
  html += makeRow(s('row_hand'), takter);
  if (hhMode !== 'off') html += makeRow(s('row_hh'), hhTakter);
  html += '</div></div></div>';
  return html;
}

// â”€â”€â”€ METRONOM â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
var audioCtx = null;
var metroActive = false;
var bpm = 80;
var nextBeatTime = 0;
var beatCount = 0;
var schedTimer = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function clickSound(time, accent) {
  var ctx = getAudioCtx();
  var osc = ctx.createOscillator();
  var gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.frequency.value = accent ? 1200 : 800;
  gain.gain.setValueAtTime(accent ? 0.45 : 0.28, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + 0.06);
  osc.start(time);
  osc.stop(time + 0.07);
}

function scheduler() {
  var ctx = getAudioCtx();
  var interval = 60.0 / bpm;
  while (nextBeatTime < ctx.currentTime + 0.1) {
    var bi = beatCount % 4;
    clickSound(nextBeatTime, bi === 0);
    (function(idx, t) {
      var delay = Math.max(0, (t - ctx.currentTime) * 1000);
      setTimeout(function() {
        if (!metroActive) return;
        for (var i=0;i<4;i++) {
          var d = document.getElementById('md'+i);
          if (d) d.classList.toggle('active', i === idx);
        }
      }, delay);
    })(bi, nextBeatTime);
    nextBeatTime += interval;
    beatCount++;
  }
  schedTimer = setTimeout(scheduler, 25);
}

function toggleMetronome() {
  var btn = document.getElementById('metro-btn');
  if (metroActive) {
    metroActive = false;
    clearTimeout(schedTimer);
    for (var i=0;i<4;i++) {
      var d = document.getElementById('md'+i);
      if (d) d.classList.remove('active');
    }
    btn.textContent = s('metro_start');
    btn.classList.remove('on');
  } else {
    var ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    metroActive = true;
    nextBeatTime = ctx.currentTime + 0.05;
    beatCount = 0;
    scheduler();
    btn.textContent = s('metro_stop');
    btn.classList.add('on');
  }
}

function setBPM(val) {
  bpm = parseInt(val, 10);
  document.getElementById('bpm-val').textContent = bpm + ' BPM';
}

// â”€â”€â”€ FOCUS MODE â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
document.addEventListener('click', function(e) {
  if (e.target.closest('#focus-overlay')) return;
  var block = e.target.closest('.ex-block');
  if (block) openFocus(block);
});

var focusBlocks = [];
var focusIdx = 0;
var touchStartX = 0, touchStartY = 0;

function openFocus(blockEl) {
  focusBlocks = [];
  ['rot','rl','tri','fri'].forEach(function(t) {
    var tab = document.getElementById('tab-' + t);
    if (tab && tab.style.display !== 'none') {
      focusBlocks = Array.prototype.slice.call(tab.querySelectorAll('.ex-block'));
    }
  });
  focusIdx = focusBlocks.indexOf(blockEl);
  if (focusIdx < 0) focusIdx = 0;
  document.body.style.overflow = 'hidden';
  showFocusAt(focusIdx, false);
  document.addEventListener('keydown', handleFocusKey);
  window.addEventListener('resize', scaleFocus);
  var ov = document.getElementById('focus-overlay');
  ov.addEventListener('touchstart', onTouchStart, { passive: true });
  ov.addEventListener('touchend', onTouchEnd);
}

function showFocusAt(idx, animate) {
  var overlay = document.getElementById('focus-overlay');
  var content = document.getElementById('focus-content');
  function doRender() {
    content.innerHTML = '';
    content.appendChild(focusBlocks[idx].cloneNode(true));
    content.style.transform = 'scale(1)';
    overlay.style.display = 'flex';
    document.getElementById('focus-prev').hidden = (idx === 0);
    document.getElementById('focus-next').hidden = (idx === focusBlocks.length - 1);
    scaleFocus();
    content.style.opacity = '1';
  }
  if (animate) {
    content.style.opacity = '0';
    setTimeout(doRender, 130);
  } else {
    doRender();
  }
}

function navigateFocus(dir) {
  var next = focusIdx + dir;
  if (next < 0 || next >= focusBlocks.length) return;
  focusIdx = next;
  showFocusAt(focusIdx, true);
}

function scaleFocus() {
  var content = document.getElementById('focus-content');
  if (!content.firstChild) return;
  content.style.transform = 'scale(1)';
  var w = content.offsetWidth, h = content.offsetHeight;
  if (!w || !h) return;
  var pad = 80;
  var scale = Math.min((window.innerWidth-pad)/w, (window.innerHeight-pad)/h);
  content.style.transform = 'scale(' + Math.min(Math.max(scale, 0.4), 5) + ')';
}

function handleFocusKey(e) {
  if (e.key === 'ArrowRight') { navigateFocus(1); return; }
  if (e.key === 'ArrowLeft')  { navigateFocus(-1); return; }
  closeFocus();
}

function onTouchStart(e) {
  touchStartX = e.changedTouches[0].clientX;
  touchStartY = e.changedTouches[0].clientY;
}

function onTouchEnd(e) {
  var dx = e.changedTouches[0].clientX - touchStartX;
  var dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    navigateFocus(dx < 0 ? 1 : -1);
  } else if (Math.abs(dx) < 10 && Math.abs(dy) < 10) {
    closeFocus();
  }
}

function closeFocus() {
  var ov = document.getElementById('focus-overlay');
  ov.style.display = 'none';
  document.getElementById('focus-content').innerHTML = '';
  document.body.style.overflow = '';
  document.removeEventListener('keydown', handleFocusKey);
  window.removeEventListener('resize', scaleFocus);
  ov.removeEventListener('touchstart', onTouchStart);
  ov.removeEventListener('touchend', onTouchEnd);
}
